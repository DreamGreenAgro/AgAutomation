<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transporter Registration & Verification</title>
    <style>
        :root {
            --primary: #1565c0;
            --bg: #e3f2fd;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 15px;
            color: #333;
        }
        .form-container {
            max-width: 500px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin: 0 auto;
        }
        h2 {
            color: var(--primary);
            margin-top: 0;
            font-size: 1.4rem;
            border-bottom: 2px solid var(--bg);
            padding-bottom: 10px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            background-color: #fafafa;
        }
        input:focus, select:focus {
            border-color: var(--primary);
            outline: none;
            background-color: white;
        }
        button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background-color: #0d47a1;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>🚛 Transporter Onboarding</h2>
    <form action="/submit_driver" method="POST">
        
        <label for="full_name">Driver / Company Name</label>
        <input type="text" id="full_name" name="full_name" placeholder="e.g., Tinashe Logistics" required>

        <label for="phone_number">WhatsApp / Phone Number</label>
        <input type="text" id="phone_number" name="phone_number" placeholder="e.g., +263773333333" required>

        <label for="vehicle_reg">Vehicle Registration Number</label>
        <input type="text" id="vehicle_reg" name="vehicle_reg" placeholder="e.g., AGE-4921-ZW" required>

        <label for="license_num">Driver's License Number</label>
        <input type="text" id="license_num" name="license_num" placeholder="e.g., DL-9938210" required>

        <label for="truck_capacity">Truck Maximum Capacity (Tonnes)</label>
        <input type="number" id="truck_capacity" name="truck_capacity" placeholder="e.g., 7.5" step="any" required>

        <button type="submit">Register & Verify Vehicle ✅</button>
    </form>
</div>

</body>
</html>
